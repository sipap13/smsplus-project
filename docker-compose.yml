services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: smsplus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - smsplus_pgdata:/var/lib/postgresql/data

  api:
    image: php:8.2-cli
    working_dir: /app
    volumes:
      - ./smsplus-api:/app
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: smsplus
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      - db
    command: >
      sh -lc "php -v
      && php artisan key:generate --force
      && php artisan migrate --force
      && php artisan serve --host=0.0.0.0 --port=8000"

  front:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./smsplus-front:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    command: >
      sh -lc "npm ci || npm install
      && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  smsplus_pgdata:

